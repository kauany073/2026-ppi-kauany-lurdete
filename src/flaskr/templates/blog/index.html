{% extends 'base.html' %}

{% block header %}
  <h1>{% block title %}Posts{% endblock %}</h1>
{% endblock %}

{% block content %}
  {% for post in posts %}
    <article class="post">
      <h2>{{ post['title'] }}</h2>

      <p>{{ post['body'] }}</p>

      <a href="{{ url_for('blog.update', id=post['id']) }}">
        Edit
      </a>
      <form action="{{ url_for('blog.delete', id=post['id']) }}" method="post">
  <button type="submit">Delete</button>
</form>
    </article>
  {% endfor %}
{% endblock %}
